spring:
  profiles:
    active: dev
  application:
    name: RevPlay_P2

  datasource:
    url: jdbc:mysql://localhost:3306/revplay_db?createDatabaseIfNotExist=true
    username: root
    password: Skywarrior@2002#
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

app:
  upload:
    dir: ./uploads

logging:
  level:
    com.revplay: DEBUG
    org.springframework.security: INFO