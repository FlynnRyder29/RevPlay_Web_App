<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('My Songs')}"></head>
<body>
<div th:replace="~{layout :: page(~{::#artist-songs-content})}">

    <div id="artist-songs-content">

        <div class="dashboard-header">
            <div class="dashboard-header-left">
                <div class="dashboard-header-info">
                    <a href="/artist/dashboard" class="back-link">← Dashboard</a>
                    <h1>My Songs</h1>
                    <p class="dashboard-subtitle" th:text="${songs != null ? songs.size() + ' tracks' : '0 tracks'}">0 tracks</p>
                </div>
            </div>
            <div class="dashboard-actions">
                <button class="btn-primary" id="btn-upload-song" style="width:auto;padding:10px 24px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px;">
                        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    Upload Song
                </button>
            </div>
        </div>

        <!-- Songs Table -->
        <div class="dashboard-table-wrapper" th:if="${songs != null && !songs.isEmpty()}">
            <table class="dashboard-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Cover</th>
                    <th>Title</th>
                    <th>Album</th>
                    <th>Genre</th>
                    <th>Plays</th>
                    <th>Visibility</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="song, iter : ${songs}" th:data-id="${song.id}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td>
                        <img th:src="${song.coverImageUrl != null ? song.coverImageUrl : 'https://placehold.co/40x40/1a1a2e/ffffff?text=♪'}"
                             alt="Cover" class="table-cover-img">
                    </td>
                    <td class="table-song-title" th:text="${song.title}">Song Title</td>
                    <td class="table-muted" th:text="${song.albumName != null ? song.albumName : '—'}">—</td>
                    <td class="table-muted" th:text="${song.genre != null ? song.genre : '—'}">—</td>
                    <td th:text="${song.playCount != null ? song.playCount : 0}">0</td>
                    <td>
                        <select class="vis-select" th:data-id="${song.id}"
                                onchange="changeVisibility(this)">
                            <option value="PUBLIC" th:selected="${song.visibility == 'PUBLIC'}">Public</option>
                            <option value="UNLISTED" th:selected="${song.visibility == 'UNLISTED'}">Unlisted</option>
                            <option value="PRIVATE" th:selected="${song.visibility == 'PRIVATE'}">Private</option>
                        </select>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit-btn" th:data-id="${song.id}"
                                    th:data-title="${song.title}" th:data-genre="${song.genre}"
                                    onclick="openEditSong(this)" title="Edit">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                                </svg>
                            </button>
                            <button class="action-btn delete-btn" th:data-id="${song.id}"
                                    th:data-title="${song.title}"
                                    onclick="deleteSong(this)" title="Delete">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                                    <polyline points="3 6 5 6 21 6"/>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${songs == null || songs.isEmpty()}" class="empty-state">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" opacity="0.5">
                    <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                </svg>
            </div>
            <h2>No songs uploaded yet</h2>
            <p>Share your music with the world</p>
            <button class="btn-primary" style="width:auto;padding:12px 30px;" onclick="document.getElementById('btn-upload-song').click()">Upload Your First Song</button>
        </div>

        <!-- ═══ Upload Song Modal ═══ -->
        <div id="upload-song-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content modal-elevated">
                <button class="modal-close" onclick="closeModal('upload-song-modal')">&times;</button>

                <div class="modal-icon-header">
                    <div class="modal-icon-circle">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                    </div>
                    <h2 class="modal-title">Upload New Song</h2>
                    <p class="modal-subtitle">Share your music with the world</p>
                </div>

                <form id="upload-song-form" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="modal-form-grid">
                        <div class="form-group">
                            <label class="modal-form-label">Title *</label>
                            <input class="modal-form-input" type="text" id="songTitle" name="title" required placeholder="Song Title">
                        </div>
                        <div class="form-group">
                            <label class="modal-form-label">Genre</label>
                            <input class="modal-form-input" type="text" id="songGenre" name="genre" placeholder="e.g. Pop, Jazz">
                        </div>
                    </div>

                    <div class="modal-form-grid">
                        <div class="form-group">
                            <label class="modal-form-label">Album</label>
                            <select class="modal-form-input" id="songAlbum" name="albumId">
                                <option value="">— No Album (Single) —</option>
                                <option th:each="album : ${albums}" th:value="${album.id}" th:text="${album.name}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="modal-form-label">Visibility</label>
                            <select class="modal-form-input" id="songVisibility" name="visibility">
                                <option value="PUBLIC">Public</option>
                                <option value="UNLISTED">Unlisted</option>
                                <option value="PRIVATE">Private</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="modal-form-label">Audio File (MP3) *</label>
                        <div class="modal-file-drop" id="audio-drop-zone">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round">
                                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                            </svg>
                            <span class="modal-file-drop-text" id="audio-file-name">Drag & drop or click to select MP3</span>
                            <input class="modal-file-hidden" type="file" id="audioFile" name="audio" accept=".mp3,audio/mpeg" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="modal-form-label">Cover Image (Optional)</label>
                        <div class="modal-file-drop modal-file-drop--small" id="cover-drop-zone">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                                <circle cx="8.5" cy="8.5" r="1.5"/>
                                <polyline points="21 15 16 10 5 21"/>
                            </svg>
                            <span class="modal-file-drop-text" id="cover-file-name">Select cover image</span>
                            <input class="modal-file-hidden" type="file" id="coverFile" name="cover" accept="image/*">
                            <img id="cover-preview" class="modal-cover-preview" style="display:none;" alt="Preview">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary modal-submit-btn" id="btn-submit-upload">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px;">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Upload Song
                    </button>
                </form>
                <div id="upload-status" class="form-status"></div>
            </div>
        </div>

        <!-- ═══ Edit Song Modal ═══ -->
        <div id="edit-song-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content modal-elevated">
                <button class="modal-close" onclick="closeModal('edit-song-modal')">&times;</button>

                <div class="modal-icon-header">
                    <div class="modal-icon-circle">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="2" stroke-linecap="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                    </div>
                    <h2 class="modal-title">Edit Song</h2>
                    <p class="modal-subtitle">Update song details</p>
                </div>

                <form id="edit-song-form">
                    <input type="hidden" id="editSongId">
                    <div class="modal-form-grid">
                        <div class="form-group">
                            <label class="modal-form-label">Title</label>
                            <input class="modal-form-input" type="text" id="editTitle" placeholder="Song Title">
                        </div>
                        <div class="form-group">
                            <label class="modal-form-label">Genre</label>
                            <input class="modal-form-input" type="text" id="editGenre" placeholder="Genre">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary modal-submit-btn" id="btn-submit-edit">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-2px;margin-right:6px;">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 21 17 13 7 13 7 21"/>
                            <polyline points="7 3 7 8 15 8"/>
                        </svg>
                        Save Changes
                    </button>
                </form>
                <div id="edit-status" class="form-status"></div>
            </div>
        </div>

        <script th:inline="javascript">
            (function() {
                var csrf = document.querySelector('meta[name="_csrf"]');
                var csrfToken = csrf ? csrf.getAttribute('content') : '';

                // ── File drop zones ──
                function setupDropZone(zoneId, inputId, nameId, previewId) {
                    var zone = document.getElementById(zoneId);
                    var input = document.getElementById(inputId);
                    var nameEl = document.getElementById(nameId);
                    if (!zone || !input) return;

                    zone.addEventListener('click', function() { input.click(); });
                    zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('modal-file-drop--active'); });
                    zone.addEventListener('dragleave', function() { zone.classList.remove('modal-file-drop--active'); });
                    zone.addEventListener('drop', function(e) {
                        e.preventDefault();
                        zone.classList.remove('modal-file-drop--active');
                        if (e.dataTransfer.files.length) {
                            input.files = e.dataTransfer.files;
                            input.dispatchEvent(new Event('change'));
                        }
                    });
                    input.addEventListener('change', function() {
                        if (this.files[0]) {
                            nameEl.textContent = this.files[0].name;
                            zone.classList.add('modal-file-drop--selected');
                            if (previewId && this.files[0].type.startsWith('image/')) {
                                var reader = new FileReader();
                                var preview = document.getElementById(previewId);
                                reader.onload = function(ev) {
                                    preview.src = ev.target.result;
                                    preview.style.display = 'block';
                                };
                                reader.readAsDataURL(this.files[0]);
                            }
                        }
                    });
                }
                setupDropZone('audio-drop-zone', 'audioFile', 'audio-file-name', null);
                setupDropZone('cover-drop-zone', 'coverFile', 'cover-file-name', 'cover-preview');

                // ── Upload Modal ──
                document.getElementById('btn-upload-song').addEventListener('click', function() {
                    document.getElementById('upload-song-modal').style.display = 'flex';
                });

                document.getElementById('upload-song-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var btn = document.getElementById('btn-submit-upload');
                    var status = document.getElementById('upload-status');
                    var fd = new FormData(this);

                    btn.disabled = true;
                    btn.textContent = 'Uploading...';
                    status.textContent = '';

                    fetch('/api/artists/songs', {
                        method: 'POST',
                        headers: { 'X-CSRF-TOKEN': csrfToken },
                        body: fd
                    }).then(function(r) {
                        if (r.status >= 200 && r.status < 300) {
                            RevPlay.toast({ type: 'success', message: 'Song uploaded successfully!' });
                            setTimeout(function() { window.location.reload(); }, 1000);
                        } else {
                            return r.json().then(function(d) { throw new Error(d.message || 'Upload failed'); });
                        }
                    }).catch(function(err) {
                        RevPlay.toast({ type: 'error', message: err.message });
                        btn.disabled = false;
                        btn.textContent = 'Upload Song';
                    });
                });

                // ── Edit Song ──
                window.openEditSong = function(el) {
                    document.getElementById('editSongId').value = el.dataset.id;
                    document.getElementById('editTitle').value = el.dataset.title || '';
                    document.getElementById('editGenre').value = el.dataset.genre || '';
                    document.getElementById('edit-song-modal').style.display = 'flex';
                };

                document.getElementById('edit-song-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var id = document.getElementById('editSongId').value;
                    var btn = document.getElementById('btn-submit-edit');
                    btn.disabled = true;
                    btn.textContent = 'Saving...';

                    fetch('/api/artists/songs/' + id, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfToken },
                        body: JSON.stringify({
                            title: document.getElementById('editTitle').value,
                            genre: document.getElementById('editGenre').value
                        })
                    }).then(function(r) {
                        if (r.ok) {
                            RevPlay.toast({ type: 'success', message: 'Song updated!' });
                            setTimeout(function() { window.location.reload(); }, 800);
                        } else { throw new Error('Save failed'); }
                    }).catch(function(err) {
                        RevPlay.toast({ type: 'error', message: err.message });
                        btn.disabled = false;
                        btn.textContent = 'Save Changes';
                    });
                });

                window.changeVisibility = function(select) {
                    fetch('/api/artists/songs/' + select.dataset.id + '/visibility?visibility=' + select.value, {
                        method: 'PUT', headers: { 'X-CSRF-TOKEN': csrfToken }
                    }).then(function(r) {
                        if (r.ok) {
                            RevPlay.toast({ type: 'success', message: 'Visibility updated' });
                        } else {
                            RevPlay.toast({ type: 'error', message: 'Failed to update visibility' });
                            window.location.reload();
                        }
                    });
                };

                window.deleteSong = function(el) {
                    var title = el.dataset.title || 'this song';
                    RevPlay.confirm({
                        title: 'Delete Song',
                        message: 'Delete "' + title + '"? This cannot be undone.',
                        type: 'danger',
                        confirmText: 'Delete',
                        cancelText: 'Cancel'
                    }).then(function(confirmed) {
                        if (!confirmed) return;
                        fetch('/api/artists/songs/' + el.dataset.id, {
                            method: 'DELETE', headers: { 'X-CSRF-TOKEN': csrfToken }
                        }).then(function(r) {
                            if (r.status >= 200 && r.status < 300) {
                                var row = el.closest('tr');
                                if (row) {
                                    row.style.transition = 'opacity .3s, transform .3s';
                                    row.style.opacity = '0';
                                    row.style.transform = 'translateX(20px)';
                                    setTimeout(function() { row.remove(); }, 300);
                                }
                                RevPlay.toast({ type: 'success', message: 'Song deleted' });
                            } else {
                                RevPlay.toast({ type: 'error', message: 'Failed to delete song' });
                            }
                        });
                    });
                };

                window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };
                document.querySelectorAll('.modal-overlay').forEach(function(m) {
                    m.addEventListener('click', function(e) { if (e.target === m) m.style.display = 'none'; });
                });
            })();
        </script>

    </div>
</div>
</body>
</html>
