<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('My Songs')}"></head>
<body>
<div th:replace="~{layout :: page(~{::#artist-songs-content})}">

    <div id="artist-songs-content">

        <div class="dashboard-header">
            <div class="dashboard-header-left">
                <div class="dashboard-header-info">
                    <a href="/artist/dashboard" class="back-link">← Dashboard</a>
                    <h1>My Songs</h1>
                    <p class="dashboard-subtitle" th:text="${songs != null ? songs.size() + ' tracks' : '0 tracks'}">0 tracks</p>
                </div>
            </div>
            <div class="dashboard-actions">
                <button class="btn-primary" id="btn-upload-song">+ Upload Song</button>
            </div>
        </div>

        <!-- Songs Table -->
        <div class="dashboard-table-wrapper" th:if="${songs != null && !songs.isEmpty()}">
            <table class="dashboard-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Cover</th>
                    <th>Title</th>
                    <th>Album</th>
                    <th>Genre</th>
                    <th>Plays</th>
                    <th>Visibility</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="song, iter : ${songs}" th:data-id="${song.id}">
                    <td th:text="${iter.index + 1}">1</td>
                    <td>
                        <img th:src="${song.coverImageUrl != null ? song.coverImageUrl : 'https://placehold.co/40x40/1a1a2e/ffffff?text=♪'}"
                             alt="Cover" class="table-cover-img">
                    </td>
                    <td class="table-song-title" th:text="${song.title}">Song Title</td>
                    <td class="table-muted" th:text="${song.albumName != null ? song.albumName : '—'}">—</td>
                    <td class="table-muted" th:text="${song.genre != null ? song.genre : '—'}">—</td>
                    <td th:text="${song.playCount != null ? song.playCount : 0}">0</td>
                    <td>
                        <select class="vis-select" th:data-id="${song.id}"
                                onchange="changeVisibility(this)">
                            <option value="PUBLIC" th:selected="${song.visibility == 'PUBLIC'}">Public</option>
                            <option value="UNLISTED" th:selected="${song.visibility == 'UNLISTED'}">Unlisted</option>
                            <option value="PRIVATE" th:selected="${song.visibility == 'PRIVATE'}">Private</option>
                        </select>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit-btn" th:data-id="${song.id}"
                                    th:data-title="${song.title}" th:data-genre="${song.genre}"
                                    onclick="openEditSong(this)">✏️</button>
                            <button class="action-btn delete-btn" th:data-id="${song.id}"
                                    onclick="deleteSong(this)">🗑️</button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${songs == null || songs.isEmpty()}" class="empty-state">
            <div class="empty-icon">🎵</div>
            <h2>No songs uploaded yet</h2>
            <p>Share your music with the world</p>
            <button class="btn-primary" onclick="document.getElementById('btn-upload-song').click()">Upload Your First Song</button>
        </div>

        <!-- Upload Song Modal -->
        <div id="upload-song-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content auth-container">
                <button class="modal-close" onclick="closeModal('upload-song-modal')">&times;</button>
                <h2 class="auth-title">Upload New Song</h2>
                <form id="upload-song-form" enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="form-group">
                        <label class="form-label">Title *</label>
                        <input class="form-input" type="text" id="songTitle" name="title" required placeholder="Song Title">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Genre</label>
                        <input class="form-input" type="text" id="songGenre" name="genre" placeholder="e.g. Pop, Jazz">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Album (Optional)</label>
                        <select class="form-input" id="songAlbum" name="albumId">
                            <option value="">— No Album (Single) —</option>
                            <option th:each="album : ${albums}" th:value="${album.id}" th:text="${album.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Visibility</label>
                        <select class="form-input" id="songVisibility" name="visibility">
                            <option value="PUBLIC">Public</option>
                            <option value="UNLISTED">Unlisted</option>
                            <option value="PRIVATE">Private</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Audio File (MP3) *</label>
                        <input class="form-input" type="file" id="audioFile" name="audio" accept=".mp3,audio/mpeg" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cover Image (Optional)</label>
                        <input class="form-input" type="file" id="coverFile" name="cover" accept="image/*">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%" id="btn-submit-upload">Upload Song</button>
                </form>
                <div id="upload-status" class="form-status"></div>
            </div>
        </div>

        <!-- Edit Song Modal -->
        <div id="edit-song-modal" class="modal-overlay" style="display:none;">
            <div class="modal-content auth-container">
                <button class="modal-close" onclick="closeModal('edit-song-modal')">&times;</button>
                <h2 class="auth-title">Edit Song</h2>
                <form id="edit-song-form">
                    <input type="hidden" id="editSongId">
                    <div class="form-group">
                        <label class="form-label">Title</label>
                        <input class="form-input" type="text" id="editTitle" placeholder="Song Title">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Genre</label>
                        <input class="form-input" type="text" id="editGenre" placeholder="Genre">
                    </div>
                    <button type="submit" class="btn-primary" style="width:100%" id="btn-submit-edit">Save Changes</button>
                </form>
                <div id="edit-status" class="form-status"></div>
            </div>
        </div>

        <script th:inline="javascript">
            (function() {
                var csrf = document.querySelector('meta[name="_csrf"]');
                var csrfToken = csrf ? csrf.getAttribute('content') : '';

                // ── Upload Modal ─────────────────────────────────────────────────
                document.getElementById('btn-upload-song').addEventListener('click', function() {
                    document.getElementById('upload-song-modal').style.display = 'flex';
                });

                document.getElementById('upload-song-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var form = this;
                    var btn = document.getElementById('btn-submit-upload');
                    var status = document.getElementById('upload-status');
                    var fd = new FormData(form);

                    btn.disabled = true;
                    btn.textContent = 'Uploading...';
                    status.textContent = '';

                    fetch('/api/artists/songs', {
                        method: 'POST',
                        headers: { 'X-CSRF-TOKEN': csrfToken },
                        body: fd
                    }).then(function(r) {
                        if (r.status >= 200 && r.status < 300) {
                            status.style.color = '#4CAF50';
                            status.textContent = 'Upload successful! Refreshing...';
                            setTimeout(function() { window.location.reload(); }, 1000);
                        } else {
                            return r.json().then(function(d) {
                                throw new Error(d.message || 'Upload failed');
                            });
                        }
                    }).catch(function(err) {
                        status.style.color = '#e74c3c';
                        status.textContent = err.message;
                        btn.disabled = false;
                        btn.textContent = 'Upload Song';
                    });
                });

                // ── Edit Song ────────────────────────────────────────────────────
                window.openEditSong = function(el) {
                    document.getElementById('editSongId').value = el.dataset.id;
                    document.getElementById('editTitle').value = el.dataset.title || '';
                    document.getElementById('editGenre').value = el.dataset.genre || '';
                    document.getElementById('edit-song-modal').style.display = 'flex';
                };

                document.getElementById('edit-song-form').addEventListener('submit', function(e) {
                    e.preventDefault();
                    var id = document.getElementById('editSongId').value;
                    var status = document.getElementById('edit-status');
                    var btn = document.getElementById('btn-submit-edit');

                    btn.disabled = true;
                    btn.textContent = 'Saving...';

                    fetch('/api/artists/songs/' + id, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRF-TOKEN': csrfToken
                        },
                        body: JSON.stringify({
                            title: document.getElementById('editTitle').value,
                            genre: document.getElementById('editGenre').value
                        })
                    }).then(function(r) {
                        if (r.ok) {
                            status.style.color = '#4CAF50';
                            status.textContent = 'Saved! Refreshing...';
                            setTimeout(function() { window.location.reload(); }, 800);
                        } else {
                            throw new Error('Save failed');
                        }
                    }).catch(function(err) {
                        status.style.color = '#e74c3c';
                        status.textContent = err.message;
                        btn.disabled = false;
                        btn.textContent = 'Save Changes';
                    });
                });

                // ── Visibility Toggle ────────────────────────────────────────────
                window.changeVisibility = function(select) {
                    var id = select.dataset.id;
                    fetch('/api/artists/songs/' + id + '/visibility?visibility=' + select.value, {
                        method: 'PUT',
                        headers: { 'X-CSRF-TOKEN': csrfToken }
                    }).then(function(r) {
                        if (!r.ok) {
                            alert('Failed to change visibility');
                            window.location.reload();
                        }
                    });
                };

                // ── Delete Song ──────────────────────────────────────────────────
                window.deleteSong = function(el) {
                    if (!confirm('Delete this song? This cannot be undone.')) return;
                    var id = el.dataset.id;
                    fetch('/api/artists/songs/' + id, {
                        method: 'DELETE',
                        headers: { 'X-CSRF-TOKEN': csrfToken }
                    }).then(function(r) {
                        if (r.status >= 200 && r.status < 300) {
                            el.closest('tr').remove();
                        } else {
                            alert('Failed to delete');
                        }
                    });
                };

                // ── Modal Close ──────────────────────────────────────────────────
                window.closeModal = function(id) {
                    document.getElementById(id).style.display = 'none';
                };

                // Close modals on overlay click
                document.querySelectorAll('.modal-overlay').forEach(function(m) {
                    m.addEventListener('click', function(e) {
                        if (e.target === m) m.style.display = 'none';
                    });
                });
            })();
        </script>

    </div>
</div>
</body>
</html>
