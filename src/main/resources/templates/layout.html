<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf?.token}" />
    <title th:text="${title + ' - RevPlay'}">RevPlay</title>

    <!-- Favicon (inline SVG — no image file needed) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' x='0px' y='0px' width='100' height='100' viewBox='0 0 72 72' style='fill:%23FD7E14;'><path d='M48.824,12.041C49.943,11.799,51,12.652,51,13.797v9.03c0,1.059-0.739,1.975-1.774,2.199l-9.043,1.957 C39.493,27.133,39,27.743,39,28.449c0,0,0,17.779,0,20.641C39,55.491,34.494,60,29.312,60C23.364,60,21,56.458,21,53.68 c0-5.619,3.937-7.431,8.312-8.334C32.14,44.763,33,43.919,33,42.843s0-25.562,0-25.562c0-1.059,0.739-1.975,1.774-2.199 L48.824,12.041z'></path></svg>">

    <!-- Theme init (prevents FOUC) -->
    <script>
        (function () {
            var t = localStorage.getItem('revplay-theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();

        window.RevPlay = window.RevPlay || {};
        if (!window.RevPlay.confirm) {
            window.RevPlay.confirm = function(opts) {
                return Promise.resolve(confirm(opts && opts.message ? opts.message : 'Are you sure?'));
            };
        }
        if (!window.RevPlay.toast) {
            window.RevPlay.toast = function(opts) {};
        }
    </script>

    <!-- CSS Modules (order matters) -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/icons.css}">
    <link rel="stylesheet" th:href="@{/css/player.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
    <link rel="stylesheet" th:href="@{/css/pages/home.css}">
    <link rel="stylesheet" th:href="@{/css/pages/library.css}">
    <link rel="stylesheet" th:href="@{/css/pages/playlist.css}">
    <link rel="stylesheet" th:href="@{/css/pages/artist.css}">
    <link rel="stylesheet" th:href="@{/css/pages/search.css}">
    <link rel="stylesheet" th:href="@{/css/pages/profile.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
    <link rel="stylesheet" th:href="@{/css/pages/history.css}">
    <link rel="stylesheet" th:href="@{/css/pages/admin.css}">
    <link rel="stylesheet" th:href="@{/css/pages/about.css}">

    <!-- JS -->
    <script th:src="@{/js/confirm-toast.js}"></script>
    <script th:src="@{/js/theme.js}" defer></script>
    <script th:src="@{/js/player.js}" defer></script>
    <script th:src="@{/js/favorites.js}" defer></script>
    <script th:src="@{/js/playlist-actions.js}" defer></script>
    <script th:src="@{/js/navigation.js}" defer></script>
    <script th:src="@{/js/sidebar.js}" defer></script>
</head>


<body>
    <div th:fragment="page(content)">
        <div class="app-container">

            <!-- Top Navbar -->
            <div th:replace="~{fragments/navbar :: mainNav}"></div>

            <!-- Main Area: Sidebar + Content -->
            <div class="main-content">

                <!-- Side Drawer Navigation -->
                <div th:replace="~{fragments/sidebar :: sidebar}"></div>

                <!-- Scrollable Content Area -->
                <main class="content-area">
                    <th:block th:replace="${content}"></th:block>

                    <!-- Footer -->
                    <div th:replace="~{fragments/footer :: mainFooter}" style="margin-top: 50px;"></div>
                </main>
            </div>

            <!-- Player Bar (authenticated only) -->
            <div sec:authorize="isAuthenticated()">
                <div th:replace="~{fragments/player-bar :: player}"></div>

                <!-- Add to Playlist global modal -->
                <div th:replace="~{fragments/playlist-modal :: playlistModal}"></div>
            </div>
        </div>
    </div>
</body>

</html>
