<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('Library')}"></head>
<body>
<div th:replace="~{layout :: page(~{::#library-content})}">

    <div id="library-content">

        <!-- ============ Page Header ============ -->
        <div class="library-header">
            <h1>Browse Music</h1>
            <p class="library-subtitle">Discover songs from talented artists</p>
        </div>

        <!-- ============ Search & Filter Bar ============ -->
        <div class="library-controls">
            <!-- Search (no form — JS handles it) -->
            <div class="search-form">
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text"
                           id="library-search-input"
                           class="search-input"
                           placeholder="Search songs, artists..."
                           th:value="${currentQuery}">
                </div>
                <button type="button" id="library-search-btn" class="btn-search">Search</button>
            </div>

            <!-- Genre Filter (no form — JS handles it) -->
            <div class="genre-filter-form">
                <select id="library-genre-select" class="genre-select">
                    <option value="">All Genres</option>
                    <option th:each="g : ${genres}"
                            th:value="${g.name}"
                            th:text="${g.name}"
                            th:selected="${g.name == currentGenre}">Genre</option>
                </select>
            </div>
        </div>

        <!-- Active Filter Indicator -->
        <div class="active-filters" th:if="${currentQuery != null || currentGenre != null}">
            <span class="filter-label">Showing results for:</span>
            <span class="filter-tag" th:if="${currentQuery != null}" th:text="'Search: ' + ${currentQuery}"></span>
            <span class="filter-tag" th:if="${currentGenre != null}" th:text="'Genre: ' + ${currentGenre}"></span>
            <a th:href="@{/library}" class="clear-filters">✕ Clear</a>
        </div>

        <!-- ============ Song Grid ============ -->
        <div class="song-grid" th:if="${songs != null && songs.totalElements > 0}">
            <th:block th:each="song : ${songs.content}">
                <div th:replace="~{fragments/song-card :: card(song=${song})}"></div>
            </th:block>
        </div>

        <!-- Empty State -->
        <div class="empty-state" th:if="${songs == null || songs.totalElements == 0}">
            <div class="empty-icon">🎵</div>
            <h2>No songs found</h2>
            <p th:if="${currentQuery != null}">Try a different search term</p>
            <p th:if="${currentQuery == null}">Songs will appear here once artists upload them</p>
            <a th:href="@{/library}" class="btn-primary" style="display: inline-block; width: auto; padding: 12px 30px; margin-top: 15px;">Browse All</a>
        </div>

        <!-- ============ Pagination ============ -->
        <div class="pagination" th:if="${songs != null && songs.totalPages > 1}">
            <!-- Previous -->
            <a th:if="${songs.hasPrevious()}"
               th:href="@{/library(q=${currentQuery}, genre=${currentGenre}, page=${songs.number - 1}, size=${songs.size})}"
               class="page-link">← Previous</a>
            <span th:if="${!songs.hasPrevious()}" class="page-link disabled">← Previous</span>

            <!-- Page Numbers -->
            <div class="page-numbers">
                <th:block th:each="i : ${#numbers.sequence(0, songs.totalPages - 1)}">
                    <a th:if="${i != songs.number}"
                       th:href="@{/library(q=${currentQuery}, genre=${currentGenre}, page=${i}, size=${songs.size})}"
                       th:text="${i + 1}"
                       class="page-num"></a>
                    <span th:if="${i == songs.number}"
                          th:text="${i + 1}"
                          class="page-num active"></span>
                </th:block>
            </div>

            <!-- Next -->
            <a th:if="${songs.hasNext()}"
               th:href="@{/library(q=${currentQuery}, genre=${currentGenre}, page=${songs.number + 1}, size=${songs.size})}"
               class="page-link">Next →</a>
            <span th:if="${!songs.hasNext()}" class="page-link disabled">Next →</span>
        </div>

        <!-- Song Count -->
        <div class="song-count" th:if="${songs != null && songs.totalElements > 0}">
            <span th:text="'Showing ' + ${songs.numberOfElements} + ' of ' + ${songs.totalElements} + ' songs'"></span>
        </div>

        <!-- ============ Library Script (PJAX-aware) ============ -->
        <script>
            (function () {
                'use strict';

                var searchInput = document.getElementById('library-search-input');
                var searchBtn = document.getElementById('library-search-btn');
                var genreSelect = document.getElementById('library-genre-select');

                /**
                 * Build the /library URL with current search + genre params.
                 */
                function buildLibraryUrl(query, genre) {
                    var params = [];
                    if (query) params.push('q=' + encodeURIComponent(query));
                    if (genre) params.push('genre=' + encodeURIComponent(genre));
                    return '/library' + (params.length ? '?' + params.join('&') : '');
                }

                /**
                 * Navigate via PJAX (keeps music playing) or fallback to full reload.
                 */
                function navigate(url) {
                    if (window.PjaxRouter && window.PjaxRouter.navigate) {
                        window.PjaxRouter.navigate(url);
                    } else {
                        window.location.href = url;
                    }
                }

                /**
                 * Get current genre from the select (if it still exists after re-render).
                 */
                function getCurrentGenre() {
                    var sel = document.getElementById('library-genre-select');
                    return sel ? sel.value : '';
                }

                /**
                 * Get current query from the input (if it still exists after re-render).
                 */
                function getCurrentQuery() {
                    var inp = document.getElementById('library-search-input');
                    return inp ? inp.value.trim() : '';
                }

                // ── Search button click ──
                if (searchBtn) {
                    searchBtn.addEventListener('click', function (e) {
                        e.preventDefault();
                        var query = getCurrentQuery();
                        var genre = getCurrentGenre();
                        navigate(buildLibraryUrl(query, genre));
                    });
                }

                // ── Enter key in search input ──
                if (searchInput) {
                    searchInput.addEventListener('keydown', function (e) {
                        if (e.key === 'Enter' || e.keyCode === 13) {
                            e.preventDefault();
                            var query = getCurrentQuery();
                            var genre = getCurrentGenre();
                            navigate(buildLibraryUrl(query, genre));
                        }
                    });
                }

                // ── Genre dropdown change ──
                if (genreSelect) {
                    genreSelect.addEventListener('change', function () {
                        var query = getCurrentQuery();
                        var genre = this.value;
                        navigate(buildLibraryUrl(query, genre));
                    });
                }

            })();
        </script>

    </div>
</div>
</body>
</html>
