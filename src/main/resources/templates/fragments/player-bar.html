<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="player" class="player-bar">

    <!-- Hidden audio element -->
    <audio id="audio-element" preload="none"></audio>

    <!-- ═══ Left: Now Playing Info ═══ -->
    <div class="player-left">
        <img id="player-art"
             src=""
             alt="Album Art"
             class="player-album-art"
             style="display: none;">
        <div class="player-track-info">
            <div id="player-title" class="player-track-title">Not Playing</div>
            <div id="player-artist" class="player-track-artist">—</div>
        </div>

        <!-- Player action buttons (favorite + add to playlist) -->
        <div class="player-action-btns">
            <button id="player-favorite"
                    class="control-btn player-fav-btn"
                    style="display: none;"
                    title="Favorite">
                <img th:src="@{/images/icons/heart.png}"
                     alt="❤️"
                     class="player-icon-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback" style="display:none;">♡</span>
            </button>

            <button id="player-add-to-playlist"
                    class="control-btn player-playlist-btn"
                    style="display: none;"
                    title="Add to Playlist">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"/>
                    <line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/>
                    <line x1="3" y1="6" x2="3.01" y2="6"/>
                    <line x1="3" y1="12" x2="3.01" y2="12"/>
                    <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                <svg class="player-playlist-plus" width="10" height="10" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- ═══ Center: Controls + Progress ═══ -->
    <div class="player-center">
        <div class="player-controls">

            <!-- Shuffle -->
            <button id="btn-shuffle" class="control-btn" title="Shuffle">
                <img th:src="@{/images/icons/shuffle.png}"
                     alt="🔀"
                     class="player-icon-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback" style="display:none;">🔀</span>
            </button>

            <!-- Previous / Rewind -->
            <button id="btn-prev" class="control-btn" title="Previous">
                <img th:src="@{/images/icons/rewind.png}"
                     alt="⏮"
                     class="player-icon-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback" style="display:none;">⏮</span>
            </button>

            <!-- Play / Pause (toggleable) -->
            <button id="btn-play" class="control-btn control-play" title="Play">
                <img th:src="@{/images/icons/play.png}"
                     alt="▶"
                     class="player-icon-img player-play-img"
                     data-play-src="/images/icons/play.png"
                     data-pause-src="/images/icons/pause.png"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback play-fallback" style="display:none;">▶</span>
            </button>

            <!-- Next / Forward -->
            <button id="btn-next" class="control-btn" title="Next">
                <img th:src="@{/images/icons/forward.png}"
                     alt="⏭"
                     class="player-icon-img"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback" style="display:none;">⏭</span>
            </button>

            <!-- Repeat (toggleable: off → all → one) -->
            <button id="btn-repeat" class="control-btn" title="Repeat">
                <img th:src="@{/images/icons/repeat.png}"
                     alt="🔁"
                     class="player-icon-img player-repeat-img"
                     data-repeat-src="/images/icons/repeat.png"
                     data-repeat-one-src="/images/icons/repeat-one.png"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                <span class="icon-fallback repeat-fallback" style="display:none;">🔁</span>
            </button>

        </div>

        <!-- Progress Bar -->
        <div class="progress-container" id="progress-container">
            <span id="time-current" class="progress-time">0:00</span>
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
            <span id="time-total" class="progress-time">0:00</span>
        </div>
    </div>

    <!-- ═══ Right: Volume ═══ -->
    <div class="player-right">
        <span class="volume-icon">
            <img th:src="@{/images/icons/volume.png}"
                 alt="🔊"
                 class="player-icon-img"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
            <span class="icon-fallback" style="display:none;">🔊</span>
        </span>
        <div class="progress-bar-bg volume-bar">
            <div class="progress-bar-fill volume-fill" style="width: 100%;"></div>
        </div>
    </div>

</div>

</body>
</html>
