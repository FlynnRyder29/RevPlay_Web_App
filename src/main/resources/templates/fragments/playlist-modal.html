<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="playlistModal" id="add-to-playlist-modal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; align-items: center; justify-content: center;">
        <div class="modal-content auth-container" style="width: 100%; max-width: 400px; margin: 0; position: relative;">
            <button class="modal-close" id="btn-close-playlist-modal"
                style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;">&times;</button>

            <h2 class="auth-title" style="margin-bottom: 20px; text-align: left; font-size: 1.5rem;">Add to Playlist
            </h2>

            <input type="hidden" id="playlist-modal-song-id" value="">

            <div id="playlist-list-container" style="max-height: 300px; overflow-y: auto; margin-bottom: 15px;">
                <!-- Playlists injected here by JS -->
                <div style="text-align: center; color: var(--text-muted); padding: 20px;">Loading playlists...</div>
            </div>

            <!-- Create New Playlist Form inside Modal -->
            <div style="border-top: 1px solid var(--border-color); padding-top: 15px; margin-top: 15px;">
                <h4 style="margin-bottom: 10px; font-size: 0.9rem; color: var(--text-muted);">OR CREATE NEW</h4>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="new-playlist-name" class="form-input" placeholder="Playlist Name"
                        style="flex: 1; margin: 0; padding: 8px;">
                    <button class="btn-primary" id="btn-create-and-add" style="padding: 8px 15px;">Create</button>
                </div>
            </div>

            <div id="playlist-modal-status"
                style="margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px;"></div>
        </div>
    </div>
</body>

</html>
