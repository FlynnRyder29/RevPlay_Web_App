<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
<div th:fragment="playlistModal" id="add-to-playlist-modal" class="pl-modal-overlay" style="display:none;">
    <div class="pl-modal" style="max-width:420px;" onclick="event.stopPropagation()">
        <button class="pl-modal-close" id="btn-close-playlist-modal">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>

        <div class="pl-modal-header">
            <h2>Add to Playlist</h2>
            <p class="pl-modal-sub">Choose a playlist or create a new one</p>
        </div>

        <input type="hidden" id="playlist-modal-song-id" value="">

        <div id="playlist-list-container" class="pl-modal-list">
            <div class="pl-modal-loading">
                <svg class="pl-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
                Loading playlists...
            </div>
        </div>

        <div class="pl-modal-divider">
            <span>OR CREATE NEW</span>
        </div>

        <div class="pl-modal-create-row">
            <input type="text" id="new-playlist-name" class="pl-form-input" placeholder="Playlist name" style="flex:1;">
            <button class="pl-modal-create-btn" id="btn-create-and-add">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Create
            </button>
        </div>

        <div id="playlist-modal-status" class="pl-modal-status"></div>
    </div>
</div>
</body>

</html>
