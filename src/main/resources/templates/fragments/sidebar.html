<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<aside th:fragment="sidebar" class="sidebar">
    <nav class="sidebar-nav">

        <!-- ═══ Main Navigation ═══ -->
        <div class="sidebar-section">
            <a th:href="@{/}" class="sidebar-item" title="Home">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/home.png}"
                         alt="🏠"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">🏠</span>
                </span>
                <span class="sidebar-label">Home</span>
            </a>

            <a th:href="@{/library}" class="sidebar-item" title="Browse Music">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/music-book.png}"
                         alt="📚"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">📚</span>
                </span>
                <span class="sidebar-label">Browse Music</span>
            </a>
        </div>

        <!-- ═══ Authenticated User Links ═══ -->
        <div sec:authorize="isAuthenticated()" class="sidebar-section">
            <div class="sidebar-section-title">Your Music</div>

            <a th:href="@{/playlists}" class="sidebar-item" title="Playlists">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/playlist.png}"
                         alt="📋"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">📋</span>
                </span>
                <span class="sidebar-label">Playlists</span>
            </a>

            <a th:href="@{/favorites}" class="sidebar-item" title="Favorites">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/favourite.png}"
                         alt="❤️"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">❤️</span>
                </span>
                <span class="sidebar-label">Favorites</span>
            </a>

            <a th:href="@{/history}" class="sidebar-item" title="History">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/history.png}"
                         alt="🕐"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">🕐</span>
                </span>
                <span class="sidebar-label">History</span>
            </a>
        </div>

        <!-- ═══ Artist Section (ARTIST role only) ═══ -->
        <div sec:authorize="hasRole('ARTIST')" class="sidebar-section">
            <div class="sidebar-section-title">Artist</div>

            <a th:href="@{/artist/dashboard}" class="sidebar-item" title="Dashboard">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/layout.png}"
                         alt="📊"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">📊</span>
                </span>
                <span class="sidebar-label">Dashboard</span>
            </a>

            <a th:href="@{/artist/songs}" class="sidebar-item" title="My Songs">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/musical.png}"
                         alt="🎵"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">🎵</span>
                </span>
                <span class="sidebar-label">My Songs</span>
            </a>

            <a th:href="@{/artist/albums}" class="sidebar-item" title="My Albums">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/vynil.png}"
                         alt="💿"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">💿</span>
                </span>
                <span class="sidebar-label">My Albums</span>
            </a>
        </div>

        <!-- ═══ Admin Section (ADMIN role only) ═══ -->
        <div sec:authorize="hasRole('ADMIN')" class="sidebar-section">
            <div class="sidebar-section-title">Admin</div>

            <a th:href="@{/admin}" class="sidebar-item" title="Admin Panel">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/settings.png}"
                         alt="⚙️"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">⚙️</span>
                </span>
                <span class="sidebar-label">Admin Panel</span>
            </a>
        </div>

        <!-- ═══ Spacer ═══ -->
        <div class="sidebar-spacer"></div>

        <!-- ═══ Account Section (Authenticated) ═══ -->
        <div sec:authorize="isAuthenticated()" class="sidebar-section sidebar-bottom">
            <a th:href="@{/user/profile}" class="sidebar-item" title="Profile">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/user.png}"
                         alt="👤"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">👤</span>
                </span>
                <span class="sidebar-label">
                    <span sec:authentication="principal.username">User</span>
                </span>
            </a>

            <form th:action="@{/auth/logout}" method="post" class="sidebar-logout-form">
                <button type="submit" class="sidebar-item sidebar-logout-btn" title="Logout">
                    <span class="sidebar-icon">
                        <img th:src="@{/images/icons/switch.png}"
                             alt="🚪"
                             class="sidebar-icon-img"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                        <span class="sidebar-icon-fallback" style="display:none;">🚪</span>
                    </span>
                    <span class="sidebar-label">Logout</span>
                </button>
            </form>
        </div>

        <!-- ═══ Guest Links ═══ -->
        <div sec:authorize="!isAuthenticated()" class="sidebar-section sidebar-bottom">
            <a th:href="@{/auth/register}" class="sidebar-item sidebar-cta" title="Sign Up">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/signup.png}"
                         alt="✏️"
                         class="sidebar-icon-img sidebar-icon-img--cta"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">✏️</span>
                </span>
                <span class="sidebar-label">Sign Up</span>
            </a>

            <a th:href="@{/auth/login}" class="sidebar-item" title="Log In">
                <span class="sidebar-icon">
                    <img th:src="@{/images/icons/login.png}"
                         alt="🔑"
                         class="sidebar-icon-img"
                         onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
                    <span class="sidebar-icon-fallback" style="display:none;">🔑</span>
                </span>
                <span class="sidebar-label">Log In</span>
            </a>
        </div>

    </nav>
</aside>

</body>
</html>
