<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="card(song)" class="song-card"
     th:data-id="${song?.id}"
     th:data-url="${song?.audioUrl}"
     th:data-title="${song?.title}"
     th:data-artist="${song?.artistName}">

    <img th:src="${song?.coverImageUrl != null ? song.coverImageUrl : 'https://www.shutterstock.com/shutterstock/photos/2626947211/display_1500/stock-vector-jazz-music-poster-design-template-2626947211.jpg'}"
         alt="Cover">

    <div class="play-button-overlay">
        <img th:src="@{/images/icons/play.png}"
             alt="▶"
             class="card-play-icon"
             onerror="this.style.display='none'; this.nextElementSibling.style.display='inline';">
        <span class="icon-fallback card-play-fallback" style="display:none;">▶</span>
    </div>

    <div class="song-title"
         th:text="${song?.title != null ? song.title : 'Unknown Title'}">Song Title</div>
    <div class="song-artist"
         th:text="${song?.artistName != null ? song.artistName : 'Unknown Artist'}">Artist Name</div>
</div>

</body>
</html>
