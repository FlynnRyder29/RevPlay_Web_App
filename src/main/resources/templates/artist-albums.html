<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout :: head('My Albums')}"></head>
<body>
<div th:replace="~{layout :: page(~{::#artist-albums-content})}">

    <div id="artist-albums-content">

        <div class="hero-section" style="background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);">
            <h1 class="hero-title" style="color: #fff;">My Albums</h1>
            <p class="hero-subtitle" style="color: rgba(255,255,255,0.7);">Manage your albums</p>
            <button class="btn-primary" id="btn-create-album" style="margin-top: 20px;">Create New Album</button>
        </div>

        <!-- ALBUMS GRID -->
        <div class="song-grid" style="margin-top: 30px;" th:if="${albums != null and !albums.isEmpty()}">
            <div th:each="album : ${albums}" class="song-card" style="cursor: default;" th:data-id="${album.id}">
                <div class="song-card-img-wrapper">
                    <img th:src="${album.coverImageUrl} ?: 'https://www.shutterstock.com/shutterstock/photos/2626947211/display_1500/stock-vector-jazz-music-poster-design-template-2626947211.jpg'"
                         alt="Album Art">
                </div>
                <div class="song-card-info">
                    <div class="song-card-title" th:text="${album.name}">Album Name</div>
                    <div class="song-card-artist" th:text="${#temporals.format(album.releaseDate, 'yyyy')}">2023</div>
                </div>
            </div>
        </div>

        <div th:if="${albums == null or albums.isEmpty()}" class="empty-state"
             style="text-align: center; margin-top: 60px;">
            <div style="font-size: 48px; margin-bottom: 20px;">💿</div>
            <h2>No albums created yet</h2>
            <p style="color: var(--text-muted);">Organize your songs into albums.</p>
        </div>

        <!-- Create Album Modal -->
        <div id="create-album-modal" class="modal-overlay"
             style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;">
            <div class="modal-content auth-container"
                 style="width: 100%; max-width: 500px; margin: 0; position: relative;">
                <button class="modal-close" id="btn-close-album"
                        style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer;">&times;</button>
                <h2 class="auth-title">Create New Album</h2>

                <form id="create-album-form">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <div class="form-group">
                        <label class="form-label" for="albumName">Name *</label>
                        <input class="form-input" type="text" id="albumName" name="name" required
                               placeholder="Album Name">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="releaseDate">Release Date *</label>
                        <input class="form-input" type="date" id="releaseDate" name="releaseDate" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="coverImageUrl">Cover Image URL</label>
                        <input class="form-input" type="text" id="coverImageUrl" name="coverImageUrl"
                               placeholder="https://example.com/image.jpg">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="description">Description (Optional)</label>
                        <textarea class="form-input" id="description" name="description" rows="3"
                                  placeholder="Tell us about this album..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;"
                            id="btn-submit-album">Create Album</button>
                </form>
                <div id="album-status"
                     style="margin-top: 15px; text-align: center; color: var(--text-main); font-size: 14px;"></div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                var modal = document.getElementById('create-album-modal');
                var btnOpen = document.getElementById('btn-create-album');
                var btnClose = document.getElementById('btn-close-album');
                var form = document.getElementById('create-album-form');
                var statusDiv = document.getElementById('album-status');
                var submitBtn = document.getElementById('btn-submit-album');

                if (btnOpen) {
                    btnOpen.addEventListener('click', function () { modal.style.display = 'flex'; });
                }
                if (btnClose) {
                    btnClose.addEventListener('click', function () { modal.style.display = 'none'; });
                }

                window.addEventListener('click', function (e) {
                    if (e.target === modal) modal.style.display = 'none';
                });

                if (form) {
                    form.addEventListener('submit', function (e) {
                        e.preventDefault();

                        var csrfToken = this.querySelector('input[name="_csrf"]').value;
                        var data = {
                            name: document.getElementById('albumName').value,
                            releaseDate: document.getElementById('releaseDate').value,
                            coverImageUrl: document.getElementById('coverImageUrl').value,
                            description: document.getElementById('description').value
                        };

                        submitBtn.disabled = true;
                        submitBtn.innerText = 'Creating...';
                        statusDiv.innerText = '';

                        fetch('/api/artists/albums', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRF-TOKEN': csrfToken
                            },
                            body: JSON.stringify(data)
                        })
                            .then(function (response) {
                                if (response.ok) {
                                    statusDiv.style.color = '#4CAF50';
                                    statusDiv.innerText = 'Album created successfully! Refreshing...';
                                    setTimeout(function () { window.location.reload(); }, 1000);
                                } else {
                                    return response.json().then(function (errData) {
                                        throw new Error(errData.message || 'Creation failed');
                                    }).catch(function () {
                                        throw new Error('Creation failed with status ' + response.status);
                                    });
                                }
                            })
                            .catch(function (error) {
                                console.error('Creation Error:', error);
                                statusDiv.style.color = '#e74c3c';
                                statusDiv.innerText = error.message;
                                submitBtn.disabled = false;
                                submitBtn.innerText = 'Create Album';
                            });
                    });
                }
            });
        </script>

    </div>
</div>
</body>
</html>
