<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RevPlay</title>

    <!-- Theme init (prevents FOUC) -->
    <script>
        (function () {
            var t = localStorage.getItem('revplay-theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>

    <!-- Modular CSS -->
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body>
<div class="auth-container">
    <h1>Sign up for RevPlay</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control"
                   placeholder="name@domain.com" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" class="form-control"
                   placeholder="Create a username" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control"
                   placeholder="Create a password" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="form-group">
            <label for="displayName">Display Name (Optional)</label>
            <input type="text" id="displayName" th:field="*{displayName}" class="form-control"
                   placeholder="How should we call you?"/>
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 20px;">Sign Up</button>
    </form>

    <div class="auth-links">
        <p>Already have an account? <a th:href="@{/auth/login}"
                                       style="color: var(--primary-color); text-decoration: underline;">Log in here</a>.</p>
    </div>
</div>
</body>
</html>
