<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RevPlay</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72' style='fill:%23FD7E14;'><path d='M48.824,12.041C49.943,11.799,51,12.652,51,13.652,51,13.797v9.03c0,1.059-0.739,1.975-1.774,2.199l-9.043,1.957C39.493,27.133,39,27.743,39,28.449c0,0,0,17.779,0,20.641C39,55.491,34.494,60,29.312,60C23.364,60,21,56.458,21,53.68c0-5.619,3.937-7.431,8.312-8.334C32.14,44.763,33,43.919,33,42.843s0-25.562,0-25.562c0-1.059,0.739-1.975,1.774-2.199L48.824,12.041z'/></svg>">

    <script>
        (function () {
            var t = localStorage.getItem('revplay-theme');
            if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
        })();
    </script>

    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/pages/auth.css}">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">
</head>
<body class="auth-page">

<!-- ═══ Animated Background ═══ -->
<div class="auth-bg">
    <div class="auth-bg-canvas">
        <div class="auth-orb auth-orb--1"></div>
        <div class="auth-orb auth-orb--2"></div>
        <div class="auth-orb auth-orb--3"></div>
        <div class="auth-orb auth-orb--4"></div>
    </div>
</div>

<!-- ═══ Floating Music Notes ═══ -->
<div class="auth-particles">
    <span class="auth-note auth-note--1">♪</span>
    <span class="auth-note auth-note--2">♫</span>
    <span class="auth-note auth-note--3">♬</span>
    <span class="auth-note auth-note--4">♩</span>
    <span class="auth-note auth-note--5">♪</span>
</div>

<!-- ═══ Top Bar ═══ -->
<div class="auth-topbar">
    <a th:href="@{/}" class="auth-home-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Back to Home
    </a>
    <button class="auth-theme-toggle" id="auth-theme-toggle" type="button" aria-label="Toggle theme">
            <span class="auth-theme-icon auth-theme-icon--sun">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </span>
        <span class="auth-theme-icon auth-theme-icon--moon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </span>
    </button>
</div>

<!-- ═══ Glass Card ═══ -->
<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <svg class="auth-logo-icon" width="40" height="40" viewBox="0 0 72 72" fill="currentColor">
                <path d="M48.824,12.041C49.943,11.799,51,12.652,51,13.797v9.03c0,1.059-0.739,1.975-1.774,2.199l-9.043,1.957C39.493,27.133,39,27.743,39,28.449c0,0,0,17.779,0,20.641C39,55.491,34.494,60,29.312,60C23.364,60,21,56.458,21,53.68c0-5.619,3.937-7.431,8.312-8.334C32.14,44.763,33,43.919,33,42.843s0-25.562,0-25.562c0-1.059,0.739-1.975,1.774-2.199L48.824,12.041z"/>
            </svg>
            <span class="auth-logo-text">RevPlay</span>
        </div>

        <!-- Heading -->
        <h1 class="auth-title">Join the rhythm</h1>
        <p class="auth-subtitle">Create your account and start listening</p>

        <!-- Alert -->
        <div th:if="${error}" class="auth-alert auth-alert--error">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span th:text="${error}"></span>
        </div>

        <!-- Form -->
        <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}" class="auth-form">

            <div class="auth-field auth-field--delay-1">
                <label class="auth-label" for="email">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    Email
                </label>
                <input type="email" id="email" th:field="*{email}" class="auth-input"
                       placeholder="name@domain.com" required/>
                <span class="auth-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="auth-field auth-field--delay-1">
                <label class="auth-label" for="username">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Username
                </label>
                <input type="text" id="username" th:field="*{username}" class="auth-input"
                       placeholder="Choose a unique username" required/>
                <span class="auth-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="auth-field auth-field--delay-2">
                <label class="auth-label" for="password">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Password
                </label>
                <div class="auth-input-wrap">
                    <input type="password" id="password" th:field="*{password}" class="auth-input"
                           placeholder="Create a strong password" required/>
                    <button type="button" class="auth-toggle-pw" onclick="togglePassword(this)" aria-label="Show password">
                        <svg class="pw-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="pw-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <span class="auth-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="auth-field auth-field--delay-3">
                <label class="auth-label" for="displayName">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Display Name
                    <span class="auth-optional">Optional</span>
                </label>
                <input type="text" id="displayName" th:field="*{displayName}" class="auth-input"
                       placeholder="How should we call you?"/>
            </div>

            <button type="submit" class="auth-submit auth-field--delay-3">
                <span>Create Account</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider auth-field--delay-4">
            <span>or</span>
        </div>

        <!-- Footer -->
        <p class="auth-footer auth-field--delay-4">
            Already have an account?
            <a th:href="@{/auth/login}" class="auth-link">Log in here</a>
        </p>
    </div>
</div>

<!-- ═══ Scripts ═══ -->
<script>
    function togglePassword(btn) {
        var wrap = btn.closest('.auth-input-wrap');
        var input = wrap.querySelector('input');
        var show = btn.querySelector('.pw-show');
        var hide = btn.querySelector('.pw-hide');
        if (input.type === 'password') {
            input.type = 'text';
            show.style.display = 'none';
            hide.style.display = 'block';
        } else {
            input.type = 'password';
            show.style.display = 'block';
            hide.style.display = 'none';
        }
    }

    (function() {
        var KEY = 'revplay-theme';
        var toggle = document.getElementById('auth-theme-toggle');
        if (!toggle) return;
        toggle.addEventListener('click', function() {
            var current = document.documentElement.getAttribute('data-theme');
            if (current === 'light') {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem(KEY, 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem(KEY, 'light');
            }
        });
    })();
</script>

</body>
</html>
