<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign Up - RevPlay</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<div class="auth-container">
    <h1>Sign up for RevPlay</h1>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="name@domain.com" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" th:field="*{username}" class="form-control" placeholder="Create a username" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" class="form-control" placeholder="Create a password" required/>
            <span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>

        <div class="form-group">
            <label for="displayName">Display Name (Optional)</label>
            <input type="text" id="displayName" th:field="*{displayName}" class="form-control" placeholder="How should we call you?"/>
        </div>

        <button type="submit" class="btn-primary" style="margin-top: 20px;">Sign Up</button>
    </form>

    <div class="auth-links">
        <p>Already have an account? <a th:href="@{/auth/login}" style="color: white; text-decoration: underline;">Log in here</a>.</p>
    </div>
</div>
</body>
</html>
