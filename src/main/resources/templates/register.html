<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Register - RevPlay</title></head>
<body>
<h1>Register</h1>
<div th:if="${error}" style="color:red" th:text="${error}"></div>
<form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
    <p>Email: <input type="email" th:field="*{email}" required/></p>
    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></p>
    <p>Username: <input type="text" th:field="*{username}" required/></p>
    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" style="color:red"></p>
    <p>Password: <input type="password" th:field="*{password}" required/></p>
    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></p>
    <p>Display Name: <input type="text" th:field="*{displayName}"/></p>
    <button type="submit">Register</button>
</form>
<p>Already have an account? <a th:href="@{/auth/login}">Login here</a></p>
</body>
</html>
