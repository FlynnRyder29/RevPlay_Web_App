# ============================================================
# RevPlay - Test Profile Configuration
# Location: src/test/resources/application-test.properties
# Author: Member 6 - Database, Testing & DevOps
#
# Activated by @ActiveProfiles("test") in IntegrationTestBase.
# Uses H2 in-memory DB so tests never touch the real MySQL DB.
# ============================================================

# --- H2 In-Memory Database -----------------------------------
#
# MODE=MySQL    ? H2 accepts MySQL-specific SQL syntax used in
#                 Flyway migration scripts (backticks, AUTO_INCREMENT, etc.)
# NON_KEYWORDS=USER ? H2 reserves USER as a keyword which breaks
#                 the users table. This flag un-reserves it.
# DB_CLOSE_DELAY=-1 ? keeps the DB alive for the full test run
#                 (required when multiple connections share one H2 instance)
#
spring.datasource.url=jdbc:h2:mem:revplay_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate -----------------------------------------
#
# ddl-auto=none is INTENTIONAL ? Flyway owns schema creation.
# Hibernate must not attempt to create or alter tables independently
# or it will conflict with Flyway's migration output.
#
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Suppress the open-in-view WARN that appears in test log output
spring.jpa.open-in-view=false

# --- Flyway --------------------------------------------------
#
# Flyway is ENABLED in tests ? this project uses migration scripts
# as the single source of truth for schema (ddl-auto=none above).
# H2 in MySQL mode can execute these scripts without modification.
#
# baseline-on-migrate=true ? allows Flyway to run on a non-empty
#   schema (needed when H2 already has a schema_version table from
#   a prior test in the same JVM run).
# clean-disabled=false ? allows Flyway to wipe and rebuild the schema
#   between test runs if needed.
#
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=false

# --- Session-based auth --------------------------------------
# Project uses Spring Security HttpSession ? no JWT config needed.
spring.session.store-type=none

# --- Logging - keep test output clean ------------------------
logging.level.root=WARN
logging.level.com.revplay=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=WARN
logging.level.org.springframework.security=WARN

# --- File Upload ---------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB